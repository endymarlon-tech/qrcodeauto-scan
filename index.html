<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>QR返却</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto;background:#0b0f14;color:#fff}
    .wrap{padding:14px;display:flex;flex-direction:column;gap:12px}
    .card{background:#121a24;border-radius:14px;padding:12px}
    .title{font-size:16px;font-weight:700;margin:0 0 6px}
    .sub{opacity:.8;font-size:12px;margin:0}
    video{width:100%;border-radius:14px;background:#000}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:12px;font-size:14px;font-weight:700}
    .btn{background:#2b74ff;color:#fff;flex:1;min-width:140px}
    .btn2{background:#1d2735;color:#fff;flex:1;min-width:140px}
    .msg{font-size:13px;opacity:.9;word-break:break-word;line-height:1.35}
    input{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #2a3a52;background:#0b0f14;color:#fff;padding:12px;font-size:14px}
    .hint{opacity:.75;font-size:12px;margin-top:8px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <p class="title">QRで返却</p>
    <p class="sub">カメラまたは手入力で返却できます。</p>
  </div>

  <div class="card">
    <div class="row">
      <button class="btn" id="start">カメラ開始</button>
      <button class="btn2" id="stop">停止</button>
    </div>
    <p class="msg" id="msg">開始ボタンを押してください。</p>
  </div>

  <video id="v" playsinline></video>

  <div class="card">
    <p class="sub">手入力（カメラが使えない場合）</p>
    <input id="manual" placeholder="KEY_4F_H39" />
    <div class="row" style="margin-top:10px">
      <button class="btn" id="manualBtn">手入力で返却</button>
      <button class="btn2" id="back">戻る</button>
    </div>
    <div class="hint">QRの中身は QR_ID（例: KEY_4F_H39）を推奨</div>
  </div>
</div>

<script>
const qs = new URLSearchParams(location.search);
const GAS_BASE = "https://script.google.com/macros/s/AKfycbzCXvrFKzy6BLsh2l5NJCBt_6yUtzqCcdyAsUl1WPKrBMfhmpahsL-Ej2Ggsqi4l7gD/exec";

const USER = (qs.get("user") || "").trim();
const RETURN_URL = (qs.get("return_url") || "").trim();

const v = document.getElementById("v");
const msg = document.getElementById("msg");
const manual = document.getElementById("manual");

let stream = null;
let detector = null;
let running = false;

function setMsg(t){ msg.textContent = t; }

async function startCam(){
  if (running) return;

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setMsg("getUserMedia非対応。手入力をご利用ください。");
    return;
  }

  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio:false });
    v.srcObject = stream;
    await v.play();
    running = true;

    if ("BarcodeDetector" in window) {
      detector = new BarcodeDetector({ formats: ["qr_code"] });
      setMsg("スキャン中…");
      scanLoop();
    } else {
      setMsg("BarcodeDetector非対応（Chrome推奨）。手入力も利用できます。");
    }
  }catch(e){
    setMsg("カメラ起動失敗: " + e);
  }
}

function stopCam(){
  running = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  v.srcObject = null;
  setMsg("停止しました。");
}

async function scanLoop(){
  if (!running || !detector) return;
  try{
    const codes = await detector.detect(v);
    if (codes && codes.length){
      const qr = (codes[0].rawValue || "").trim();
      if (qr){
        running = false;
        setMsg("検出: " + qr + " / 返却中…");
        await doReturn(qr);
        return;
      }
    }
  }catch(e){}
  requestAnimationFrame(scanLoop);
}

async function doReturn(qrId){
  const url = GAS_BASE + "?action=return&qr_id=" + encodeURIComponent(qrId) + "&user=" + encodeURIComponent(USER || "SCAN");
  try{
    const res = await fetch(url, { method:"GET" });
    const data = await res.json();
    if (data && data.ok){
      setMsg("返却完了。戻ります。");
      stopCam();
      setTimeout(() => { if (RETURN_URL) location.href = RETURN_URL; }, 700);
    } else {
      setMsg("返却失敗: " + JSON.stringify(data));
      running = true;
      scanLoop();
    }
  }catch(e){
    setMsg("通信エラー: " + e);
    running = true;
    scanLoop();
  }
}

document.getElementById("start").addEventListener("click", startCam);
document.getElementById("stop").addEventListener("click", stopCam);
document.getElementById("manualBtn").addEventListener("click", async () => {
  const val = (manual.value || "").trim();
  if (!val) { setMsg("QR_IDを入力してください。"); return; }
  setMsg("返却中…");
  await doReturn(val);
});
document.getElementById("back").addEventListener("click", () => {
  if (RETURN_URL) location.href = RETURN_URL;
});
</script>
</body>
</html>
